version: '3.8'

services:
  milvus:
    image: milvusdb/milvus:latest
    ports:
      - "19530:19530"
      - "19121:19121"
    environment:
      - COMMON_STORAGETYPE=local
    volumes:
      - milvus-data:/var/lib/milvus

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "9000:9000"
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - PYTHONUNBUFFERED=1
    depends_on:
      - milvus
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mcp
    restart: unless-stopped

volumes:
  milvus-data: